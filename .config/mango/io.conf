# Keyboard
xkb_rules_options=lv5:caps_switch
numlockon=1
repeat_delay=400
repeat_rate=50

# Trackpad
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
trackpad_natural_scrolling=1
scroll_method=1
drag_lock=1
disable_while_typing=1
left_handed=0
middle_button_emulation=1
swipe_min_threshold=1

# Mouse
mouse_natural_scrolling=0
accel_profile=2
middle_button_emulation=1

# Monitors
allow_tearing=1
monitorrule=name:eDP-1,width:1366,height:768,refresh:60.058998,x:1920,y:650
monitorrule=model:ViewSonic Corporation VA2406M-LED TEN124101269,width:1920,height:1080,refresh:60.000,x:1920,y:650
